name: codeql

# Static security + quality analysis of the TypeScript source. Runs on pushes
# and PRs to main, plus a weekly scheduled scan so newly published query packs
# catch anything that lands between commits. CodeQL for JS/TS analyzes source
# directly, so no build step is required here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1' # Mondays 04:27 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
