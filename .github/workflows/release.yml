name: release

# Fires on any tag push. Runs the full verification gate (lint, typecheck, test) at
# the tagged commit, builds main.js (the only gitignored artifact; styles.css,
# manifest.json, and versions.json are tracked source), verifies the tag matches the
# manifest, and publishes the artifact quartet as a GitHub release so BRAT and the
# community installer can fetch them.
#
# The gate runs here, not only in build.yml, because a tag can point at any commit,
# not necessarily a green main. Re-running it means a tag on a non-green commit fails
# before anything is published. The third-party release action is pinned to a commit
# SHA so a moved tag cannot swap in unreviewed code in this privileged (contents:
# write) workflow.

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Full gate at the tag: a tag on a non-green commit must fail before publish.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Verify artifacts
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css
          test -f versions.json
      - name: Verify manifest version matches tag
        # A mis-tagged release must fail loudly here, before anything is published.
        # The pushed tag (e.g. refs/tags/1.2.3) must equal manifest.json's version.
        # Note: Obsidian plugin tags carry no leading "v" (manifest version is plain semver).
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          echo "Tag: $TAG"
          echo "manifest.json version: $MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION). Run 'npm version' so version-bump.mjs syncs the manifest, then re-tag."
            exit 1
          fi
      - name: Create release
        # Pinned to a commit SHA (not the movable @v3 tag) to harden this
        # contents:write workflow against a repointed tag. Update deliberately.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            manifest.json
            main.js
            styles.css
            versions.json
          generate_release_notes: true
          # A tag with a pre-release suffix (e.g. 1.0.0-rc.1) is published as a
          # GitHub pre-release; a plain semver tag (1.0.0) is a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
