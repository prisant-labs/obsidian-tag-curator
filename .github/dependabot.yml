version: 2
updates:
  # npm dependencies (devDependencies: esbuild, eslint, typescript, vitest, ...)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # @types/node tracks the Node major we build on, not the latest release.
      # Decline auto major bumps (e.g. 22 -> 26); take minor/patch only.
      # Revisit when .nvmrc moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # obsidian 1.13.1 ships a self-inconsistent obsidian.d.ts (Menu/Modal/
      # PopoverSuggest miss HistoryHandler.onHistoryBack), which fails tsc.
      # Hold at the locked 1.12.3 until a fixed typings release; re-evaluate then.
      - dependency-name: "obsidian"
        versions: ["1.13.1"]

  # GitHub Actions used in the build/release workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
