name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. A note on scope: Tag Visibility is display-only and file-safe by design. It will not edit note content, rename tags (that is Tag Wrangler's role), or color tags (Colored Tags Wrangler's role). Ideas that fit "curate what is shown, never touch the files" are the best fit.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation or pain point, not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    attributes:
      label: Fit with the contract
      options:
        - label: This keeps Tag Visibility display-only (it does not edit, rename, or write note content).
